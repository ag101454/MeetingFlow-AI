<!DOCTYPE html>
<html>
<head>
    <title>AI Test</title>
</head>
<body>
    <h1>Testing Groq AI</h1>
    <button onclick="testAI()">Test AI</button>
    <pre id="result"></pre>

    <script type="module">
        import Groq from 'https://esm.sh/groq-sdk';

        const API_KEY = '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';
        
        window.testAI = async function() {
            document.getElementById('result').textContent = 'Testing...';
            
            try {
                const groq = new Groq({ apiKey: API_KEY, dangerouslyAllowBrowser: true });
                
                const completion = await groq.chat.completions.create({
                    model: "llama3-8b-8192",
                    messages: [
                        { role: "user", content: "Say hello in one sentence" }
                    ],
                    temperature: 0.5,
                    max_tokens: 100,
                });
                
                document.getElementById('result').textContent = 
                    'SUCCESS: ' + JSON.stringify(completion.choices[0].message, null, 2);
                    
            } catch (error) {
                document.getElementById('result').textContent = 
                    'ERROR: ' + error.message + '\n\nFull error: ' + JSON.stringify(error, null, 2);
            }
        };
    </script>
</body>
</html>
