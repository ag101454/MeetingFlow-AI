    <script type="application/ld+json">

        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "MeetingFlow AI",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "description": "AI-powered meeting transcription, smart task extraction, and real-time team collaboration platform.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.8",
          "ratingCount": "250"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Loading Screen (shown while React loads) -->
    <div id="initial-loader" style="
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #07111D 0%, #0a1a2e 50%, #07111D 100%);
      font-family: 'Inter', sans-serif;
    ">
      <div style="text-align: center;">
        <div style="
          width: 60px;
          height: 60px;
          border-radius: 16px;
          background: linear-gradient(135deg, #DB9941, #AE2C11);
          display: flex;
          align-items: center;
          justify-content: center;
          margin: 0 auto 20px;
          animation: pulse 2s ease-in-out infinite;
          box-shadow: 0 0 40px rgba(219, 153, 65, 0.4);
        ">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </div>
        <h1 style="color: #E5E5DF; font-size: 24px; font-weight: 700; margin: 0 0 8px;">MeetingFlow AI</h1>
        <p style="color: #5D5D5D; font-size: 14px; margin: 0;">Loading your workspace...</p>
      </div>
      <style>
        @keyframes pulse {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.05); }
        }
      </style>
    </div>

    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Hide loader when React mounts -->
    <script>
      // Hide the initial loader when React takes over
      const observer = new MutationObserver(() => {
        const loader = document.getElementById('initial-loader');
        if (loader && document.getElementById('root').children.length > 0) {
          loader.style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
</html>
